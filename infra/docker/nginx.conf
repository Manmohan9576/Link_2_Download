server {
    listen 80;
    server_name persnldevelop.tech www.persnldevelop.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name persnldevelop.tech www.persnldevelop.tech;

    ssl_certificate /etc/letsencrypt/live/persnldevelop.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/persnldevelop.tech/privkey.pem;

    location / {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeouts for long-running downloads
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}
